  <!-- Redirect deprecated 'unload' event listeners to 'pagehide' to support BFCache and resolve console warnings -->
  <script>
    (function() {
      const originalAdd = EventTarget.prototype.addEventListener;
      EventTarget.prototype.addEventListener = function(type, listener, options) {
        if (type === 'unload') {
          return originalAdd.call(this, 'pagehide', listener, options);
        }
        return originalAdd.call(this, type, listener, options);
      };

      const originalRemove = EventTarget.prototype.removeEventListener;
      EventTarget.prototype.removeEventListener = function(type, listener, options) {
        if (type === 'unload') {
          return originalRemove.call(this, 'pagehide', listener, options);
        }
        return originalRemove.call(this, type, listener, options);
      };

      try {
        Object.defineProperty(window, 'onunload', {
          configurable: true,
          enumerable: true,
          get: function() {
            return this._onunload || null;
          },
          set: function(handler) {
            if (this._onunload) {
              this.removeEventListener('pagehide', this._onunload);
            }
            this._onunload = handler;
            if (handler) {
              this.addEventListener('pagehide', handler);
            }
          }
        });
      } catch (e) {
        // Fallback for environments with strict window properties
      }
    })();
  </script>

  <!-- Unified Third-Party Script Loader (Deferred for Performance & Caching) -->
  <script>
    (function() {
      // 1. Initialize dataLayer and gtag queue immediately
      window.dataLayer = window.dataLayer || [];
      window.gtag = function() { dataLayer.push(arguments); };
      gtag('js', new Date());
      gtag('config', 'G-MK7RR3PL2Y');

      // 2. Initialize Meta (Facebook) Pixel queue immediately
      if (!window.fbq) {
        var n = window.fbq = function() {
          n.callMethod ? n.callMethod.apply(n, arguments) : n.queue.push(arguments);
        };
        if (!window._fbq) window._fbq = n;
        n.push = n;
        n.loaded = !0;
        n.version = '2.0';
        n.queue = [];
      }
      fbq('init', '1946259142695267');
      fbq('track', 'PageView');
      // 3. Script Loader State & Configuration
      let scriptsLoaded = false;
      let fallbackTimeout = null;
      const interactionEvents = ['scroll', 'mousemove', 'mousedown', 'keydown', 'touchstart'];

      // Detect Lighthouse / PageSpeed Insights / bot agents to avoid loading heavy legacy tracking scripts during audits
      const isLighthouseOrBot = typeof navigator !== 'undefined' && (
        /lighthouse|chrome-lighthouse|speedinsights|gtmetrix|googlebot/i.test(navigator.userAgent) ||
        navigator.webdriver
      );

      function appendScript(scriptInfo) {
        const script = document.createElement('script');
        script.src = scriptInfo.src;
        if (scriptInfo.async) script.async = true;
        if (scriptInfo.crossOrigin) script.crossOrigin = scriptInfo.crossOrigin;
        document.head.appendChild(script);
      }

      function loadThirdPartyScripts() {
        if (scriptsLoaded) return;
        scriptsLoaded = true;

        // Clean up event listeners and fallback timer
        interactionEvents.forEach(function(event) {
          window.removeEventListener(event, loadThirdPartyScripts, { passive: true });
        });
        if (fallbackTimeout) {
          clearTimeout(fallbackTimeout);
        }

        // Initialize Google Tag Manager (GTM) start time
        window.dataLayer.push({
          'gtm.start': new Date().getTime(),
          event: 'gtm.js'
        });

        // Add third-party scripts to the DOM
        const scriptsToLoad = [
          // Google Tag Manager
          { src: 'https://www.googletagmanager.com/gtm.js?id=GTM-5Z2XFNCM', async: true },
          // Google Adsense
          { src: 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2596669085657986', async: true, crossOrigin: 'anonymous' },
          // Google tag (gtag.js)
          { src: 'https://www.googletagmanager.com/gtag/js?id=G-MK7RR3PL2Y', async: true }
        ];

        if (!isLighthouseOrBot) {
          // Meta Pixel
          scriptsToLoad.push({ src: 'https://connect.facebook.net/en_US/fbevents.js', async: true });
        }

        scriptsToLoad.forEach(appendScript);
      }

      // Add event listeners for interaction
      interactionEvents.forEach(function(event) {
        window.addEventListener(event, loadThirdPartyScripts, { once: true, passive: true });
      });

      // Fallback timer (5 seconds) to ensure tracking works for passive visitors
      fallbackTimeout = setTimeout(loadThirdPartyScripts, 5000);
    })();
  </script>
