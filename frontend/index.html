<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IslamicNames | Meaningful Names. Timeless Legacy.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    
    <!-- Non-blocking Google Fonts loading -->
    <link 
      rel="preload" 
      href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" 
      as="style" 
      onload="this.onload=null;this.rel='stylesheet'"
    >
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;500;600;700&display=swap">
    </noscript>

    <link rel="dns-prefetch" href="https://checkout.razorpay.com">
    
    <!-- Preload local Arabic font for faster paint -->
    <link
      rel="preload"
      href="/fonts/noto-naskh-arabic.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
      @font-face {
        font-family: 'Noto Naskh Arabic';
        src: url('/fonts/noto-naskh-arabic.woff2') format('woff2');
        font-display: swap;
        unicode-range: U+0600-06FF;
      }
      :root {
        --font-sans: 'Inter', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
        --bg-color: #0d1f1a;
        --text-color: #e8f5ef;
      }
      body {
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        font-family: var(--font-sans);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
